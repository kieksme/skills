# Builds the Astro docs site and deploys to GitHub Pages.
# - release (published): runs after a GitHub Release is published (e.g. from release-please or manual). Checkout uses the release tag.
# - workflow_dispatch: manual run; checkout uses the default-branch SHA.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    # No `environment: github-pages` here: that environment’s deployment policy often
    # only allows the default branch, which blocks `release` workflows (ref = version tag).
    # Pages still deploys using `pages: write` and `id-token: write` below. To use the
    # environment again, allow tags in Repo → Settings → Environments → github-pages.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            docs/pnpm-lock.yaml
            tests/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Install test dependencies
        run: pnpm install --frozen-lockfile
        working-directory: tests

      - name: Prepare docs content
        run: |
          cp index.json docs/index.json
          rm -rf docs/skills
          cp -R skills docs/skills

      - name: Generate harness snapshot for docs
        run: |
          mkdir -p ../docs/src/data
          pnpm harness --all --mock --output json --output-file ../docs/src/data/harness-results.json
        working-directory: tests

      - name: Validate docs
        run: pnpm check
        working-directory: docs

      - name: Build
        run: pnpm build
        working-directory: docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
